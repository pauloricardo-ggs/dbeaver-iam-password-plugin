name: Build P2 Update Site

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}. Expected format: vX.X.X, for example v1.2.3."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn -B clean verify

      - name: Package update site
        run: |
          REPOSITORY_DIR="releng/br.com.ma9.dbeaver.aws.rds.iam.repository/target/repository"
          touch "${REPOSITORY_DIR}/.nojekyll"
          cd "${REPOSITORY_DIR}"
          zip -r ../../../../dbeaver-aws-rds-iam-auth-update-site.zip .

      - name: Upload update site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbeaver-aws-rds-iam-auth-update-site
          path: dbeaver-aws-rds-iam-auth-update-site.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dbeaver-aws-rds-iam-auth-update-site.zip
          generate_release_notes: true

      - name: Configure GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: releng/br.com.ma9.dbeaver.aws.rds.iam.repository/target/repository

  deploy-pages:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
