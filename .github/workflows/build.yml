name: Build P2 Update Site

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}. Expected format: vX.X.X, for example v1.2.3."
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn -B clean verify

      - name: Package update site
        run: |
          REPOSITORY_DIR="releng/dev.pauloricardo.dbeaver.aws.rds.iam.repository/target/repository"
          touch "${REPOSITORY_DIR}/.nojekyll"
          cd "${REPOSITORY_DIR}"
          zip -r ../../../../dbeaver-aws-rds-iam-auth-update-site.zip .

      - name: Upload update site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbeaver-aws-rds-iam-auth-update-site
          path: dbeaver-aws-rds-iam-auth-update-site.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dbeaver-aws-rds-iam-auth-update-site.zip
          generate_release_notes: true

      - name: Publish update site to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: releng/dev.pauloricardo.dbeaver.aws.rds.iam.repository/target/repository
          force_orphan: true
